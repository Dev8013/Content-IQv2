
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content IQ | Puter Cloud Suite</title>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              social: {
                brand: '#FF0050', // Instagramish Red/Pink
                youtube: '#FF0000',
                ig: {
                  purple: '#833ab4',
                  pink: '#fd1d1d',
                  orange: '#fcb045'
                }
              },
              dark: {
                bg: '#0a0a0a',
                card: '#121212',
                border: '#1f1f1f'
              },
              light: {
                bg: '#ffffff',
                card: '#f8f8f8',
                border: '#efefef'
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --transition-speed: 0.3s;
            --color-social-brand: #FF0050;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .font-heading { font-family: 'Outfit', sans-serif; }
        
        .glass {
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .glass {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .light .glass {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }

        .social-gradient {
            background: linear-gradient(135deg, #FF0050 0%, #FF0050 100%);
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        input::placeholder {
           color: #64748b;
           opacity: 0.4;
        }

        .dark { background-color: #000000; color: #f8fafc; }
        .light { background-color: #f8fafc; color: #0f172a; }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-neural {
          animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark bg-dark-bg text-slate-200 theme-transition">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
